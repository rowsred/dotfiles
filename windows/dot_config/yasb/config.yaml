# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

# Configuration generated by YASB Setup Wizard.
# For more information, visit https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens:
      - "*"
    class_name: yasb-bar
    alignment:
      position: top
      align: center
    animation:
      enabled: true
      duration: 300
    blur_effect:
      enabled: true
      round_corners: false
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: 50%
      height: 34
    padding:
      top: 15
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
        - home
        - clock
      center:
        - glazewm_workspaces
      right:
        #- active_window
        - volume
        - notifications
        - power_menu
widgets:
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      hide_if_offline: false
      monitor_exclusive: true
      enable_scroll_switching: true
      app_icons:
        enabled_populated: false
        enabled_active: false
        size: 12
        max_icons: 0
        hide_label: false
        hide_duplicates: false
        hide_floating: false
  home:
    type: yasb.home.HomeWidget
    options:
      label: "<span>\uE8A9</span>"
      menu_list:
        - title: User Home
          path: "~"
        - title: Download
          path: ~\Downloads
        - title: Documents
          path: ~\Documents
        - title: Pictures
          path: ~\Pictures
      system_menu: true
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: normal
      border_color: System
      alignment: left
      offset_left: -12
  clock:
    type: yasb.clock.ClockWidget
    options:
      label: "{%H:%M}<span>{alarm}</span>"
      label_alt: "{%a, %d %b %H:%M}"
      timezones: []
      calendar:
        blur: true
        round_corners: true
        alignment: center
        direction: down
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: toggle_calendar
        on_middle: toggle_label
        on_right: context_menu
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: <span>{icon}</span>
      label_alt: <span>{icon}</span>{level}
      tooltip: true
      volume_icons:
        - "\uE74F"
        - "\uE992"
        - "\uE993"
        - "\uE994"
        - "\uE995"
      callbacks:
        on_left: toggle_volume_menu
        on_right: toggle_mute
      audio_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: down
        show_apps: true
        show_app_labels: false
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uE972"
          toggle_up: "\uE971"
  notifications:
    type: yasb.notifications.NotificationsWidget
    options:
      label: "<span>\uF2A5</span>"
      label_alt: "{count} notifications"
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: toggle_notification
        on_right: do_nothing
        on_middle: do_nothing
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "<span>\uE712</span>"
      uptime: true
      show_user: true
      menu_style: popup
      popup:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        offset_left: 12
      profile_image_size: 64
      buttons:
        lock:
          - "\uDB80\uDF41"
          - Lock
        signout:
          - "\uDB80\uDF43"
          - Sign out
        sleep:
          - "\uDB82\uDD04"
          - Sleep
        hibernate:
          - "\uDB82\uDD01"
          - Hibernate
        restart:
          - "\uDB81\uDC53"
          - Restart
        shutdown:
          - "\uDB82\uDD06"
          - Shut Down
        cancel:
          - ""
          - Cancel
  active_window:
    type: yasb.active_window.ActiveWindowWidget
    options:
      label: "{win[title]}"
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      label_no_window: ""
      label_icon: true
      label_icon_size: 16
      max_length: 32
      max_length_ellipsis: "..."
      monitor_exclusive: false
